# Prefix: Ctrl-a (more ergonomic than Ctrl-b)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# General
set -g mouse on                  # click to select panes/windows, scroll
set -g history-limit 10000       # scrollback buffer
set -g base-index 1              # windows start at 1, not 0
setw -g pane-base-index 1        # panes start at 1, not 0
set -g renumber-windows on       # close window 2 of 3 → window 3 becomes 2
set -sg escape-time 0            # no delay after Escape (important for nvim)
set -g display-panes-time 2000   # prefix+q pane numbers visible for 2s (default 1s)
bind Q confirm-before -p "kill session #S? (y/n)" kill-session

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Splits (stay in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Pane borders
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=yellow'
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-indicators arrows
set -g pane-border-format " #P "
set -g window-style 'bg=colour234'
set -g window-active-style 'bg=black'

# Status bar
set -g status-position top
set -g status-style 'bg=black fg=white'
set -g status-left '[#S] '
set -g status-left-length 20
set -g status-right '#{?client_prefix,#[fg=red][PREFIX] ,}%H:%M %d-%b'
set -g window-status-current-style 'fg=yellow bold'

# Copy mode (vi keys)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Sessionizer
bind-key -r f run-shell "tmux neww tmux-sessionizer"

# Workspace layout: nvim left, opencode top-right, terminal bottom-right
bind W \
  send-keys "nvim" Enter \; \
  split-window -h -p 35 \; \
  send-keys "opencode" Enter \; \
  split-window -v -p 40 \; \
  select-pane -t 1 \; \
  rename-window "Default IDE"

# Pane resizing (repeatable: hold prefix, tap H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

