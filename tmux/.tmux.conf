# Prefix: Ctrl-a (more ergonomic than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on                  # click to select panes/windows, scroll
set -g history-limit 10000       # scrollback buffer
set -g base-index 1              # windows start at 1, not 0
setw -g pane-base-index 1        # panes start at 1, not 0
set -g renumber-windows on       # close window 2 of 3 → window 3 becomes 2
set -sg escape-time 0            # no delay after Escape (important for nvim)

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Splits (stay in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-position bottom
set -g status-style 'bg=black fg=white'
set -g status-left '[#S] '
set -g status-left-length 20
set -g status-right '%H:%M %d-%b'
set -g window-status-current-style 'fg=yellow bold'
