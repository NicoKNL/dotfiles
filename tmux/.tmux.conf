# Prefix: Ctrl-a (more ergonomic than Ctrl-b)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# General
set -g mouse on                  # click to select panes/windows, scroll
set -g history-limit 10000       # scrollback buffer
set -g base-index 1              # windows start at 1, not 0
setw -g pane-base-index 1        # panes start at 1, not 0
set -g renumber-windows on       # close window 2 of 3 → window 3 becomes 2
set -sg escape-time 0            # no delay after Escape (important for nvim)
set -g display-panes-time 2000   # prefix+q pane numbers visible for 2s (default 1s)
bind Q confirm-before -p "kill session #S? (y/n)" kill-session

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",alacritty:RGB"

# Unbind accidental layout switch (prefix+Space = next-layout by default)
unbind Space

# Splits (stay in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Catppuccin Mocha palette (reference)
# Base=#1e1e2e  Mantle=#181825  Surface0=#313244  Surface1=#45475a
# Text=#cdd6f4  Subtext1=#a6adc8
# Mauve=#cba6f7  Yellow=#f9e2af  Green=#a6e3a1  Red=#f38ba8  Blue=#89b4fa

# Pane borders
set -g pane-border-style 'fg=#313244,bg=default'
set -g pane-active-border-style 'fg=#cba6f7,bg=default'
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-indicators arrows
set -g pane-border-format " #{pane_current_command} #P "
set -g window-style 'bg=default,fg=#585b70'
set -g window-active-style 'bg=default,fg=#cdd6f4'

# Status bar
set -g status-position top
set -g status-style 'bg=default fg=#cdd6f4'
set -g status-interval 5
set -g status-justify centre

# Activity monitoring
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style 'fg=#f9e2af,bg=#313244,bold'

# Window focus titles (syncs to Alacritty titlebar)
set -g set-titles on
set -g set-titles-string '#S · #W'

# Left: session name with powerline arrow
set -g status-left '#[bg=#cba6f7,fg=#1e1e2e,bold] 󰇥 #S #[bg=default,fg=#cba6f7,nobold] '
set -g status-left-length 30

# Window tabs
set -g window-status-format '#[fg=#313244,bg=default]#[fg=#a6adc8,bg=#313244] #I #W #[fg=#313244,bg=default,nobold]#[fg=#181825,bg=default]'
set -g window-status-current-format '#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7,bold] #I #W #[fg=#cba6f7,bg=default,nobold]#[fg=#181825,bg=default]'
set -g window-status-separator ' '

# Right: prefix indicator → git branch → cwd → battery → time
set -g status-right-length 140
set -g status-right '#{?client_prefix,#[fg=#f38ba8,bg=default,bold]  PREFIX ,}#[fg=#313244,bg=default]#[fg=#a6adc8,bg=#313244]  #(cd #{pane_current_path}; git branch --show-current 2>/dev/null) #[fg=#45475a,bg=#313244]#[fg=#a6adc8,bg=#45475a]  #{b:pane_current_path} #[fg=#cba6f7,bg=#45475a]#[fg=#1e1e2e,bg=#cba6f7,bold]#(BAT=$(pmset -g batt 2>/dev/null | grep -o "[0-9]*%%" | tr -d "%"); if [ -n "$BAT" ]; then if [ "$BAT" -ge 50 ]; then echo " 󰁹 ${BAT}%%"; elif [ "$BAT" -ge 20 ]; then echo " 󰁼 ${BAT}%%"; else echo " 󰁺 ${BAT}%%"; fi; fi) 󰥔 %H:%M %d-%b '

# Copy mode (vi keys)
setw -g mode-keys vi
set -g mode-style 'bg=#cba6f7,fg=#1e1e2e'
set -g copy-mode-match-style 'bg=#f9e2af,fg=#1e1e2e'
set -g copy-mode-current-match-style 'bg=#f38ba8,fg=#1e1e2e'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Sessionizer
bind-key -r f run-shell "tmux neww tmux-sessionizer"

# Workspace layout: nvim left, opencode top-right, terminal bottom-right
bind W \
  send-keys "nvim" Enter \; \
  split-window -h -p 35 \; \
  send-keys "opencode" Enter \; \
  split-window -v -p 40 \; \
  select-pane -t 1 \; \
  rename-window "Default IDE"

# Pane resizing (repeatable: hold prefix, tap H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

